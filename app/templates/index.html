<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GeoNames Places</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/v/bs5/jq-3.7.0/dt-2.2.2/datatables.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>

    <header class="site-header py-4 mb-5">
        <div class="container">
            <div class="d-flex justify-content-between align-items-baseline">
                <h1 class="fs-4 mb-0" style="color:var(--text-muted)">
                    <i class="bi bi-globe2 me-2" style="color:var(--accent)"></i>GeoNames Places
                    <small class="ms-2 text-secondary" style="font-size:0.7rem">13M+ records</small>
                </h1>
                <span class="text-secondary" style="font-size:0.75rem">
                    powered by
                    <a href="https://github.com/pjosols/mongo-datatables" target="_blank"
                       class="text-decoration-none" style="color:var(--accent)">mongo-datatables</a>
                </span>
            </div>
        </div>
    </header>

    <div class="container mb-5">
        <div class="card shadow">
            <div class="card-body p-4 p-lg-5">
                <table id="places_table" class="table table-striped table-hover" style="width:100%">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Country</th>
                            <th>Feature</th>
                            <th>Region</th>
                            <th>Population</th>
                            <th>Timezone</th>
                        </tr>
                    </thead>
                </table>
            </div>
        </div>
    </div>

    <footer class="text-center text-secondary py-5" style="font-size:0.75rem">
        Data sourced from <a href="https://www.geonames.org/" target="_blank" class="text-secondary">GeoNames</a>
        (CC BY 4.0) &middot;
        Server-side processing by
        <a href="https://github.com/pjosols/mongo-datatables" target="_blank">mongo-datatables</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/v/bs5/jq-3.7.0/dt-2.2.2/datatables.min.js"></script>
    <script src="/static/js/table.js"></script>
</body>
</html>
